  <style>
    :root { --bg:#fff5ec;--surface:#fff;--strawberry:#e63946;--strawberry-bright:#ff5169;--strawberry-deep:#c1121f;--strawberry-soft:#ffd4d8;--ink:#2a1820;--ink-dim:#5e4147; }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { font-family:'Inter',system-ui,sans-serif;color:var(--ink);background:var(--bg);background-image:radial-gradient(ellipse at top right,rgba(255,182,193,.4),transparent 55%),radial-gradient(ellipse at bottom left,rgba(142,202,230,.25),transparent 55%),linear-gradient(180deg,#fff5ec 0%,#ffeede 50%,#fff8f1 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px; }
    .card { max-width:600px;text-align:center; }
    .brand { font-family:'Great Vibes',cursive;font-size:42px;background:linear-gradient(135deg,var(--strawberry-bright),var(--strawberry),var(--strawberry-deep));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;display:inline-block;margin-bottom:32px;line-height:1.4;padding:6px 10px;text-decoration:none; }
    .eyebrow { font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.3em;color:var(--strawberry);margin:0 0 18px; }
    .portrait { width:220px;height:220px;margin:0 auto 24px;border-radius:50%;overflow:hidden;border:3px solid var(--strawberry);box-shadow:0 14px 36px rgba(230,57,70,.25),0 0 50px rgba(255,182,193,.4);background:var(--surface); }
    .portrait img { width:100%;height:100%;object-fit:cover;display:block; }
    h1 { font-family:'Playfair Display',serif;font-size:clamp(34px,5vw,50px);font-weight:700;background:linear-gradient(135deg,var(--strawberry-bright),var(--strawberry-deep));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin:0 0 16px;line-height:1.1; }
    .desc { font-family:'Playfair Display',serif;font-style:italic;font-size:17px;color:var(--ink-dim);max-width:480px;margin:0 auto 32px;line-height:1.55; }
    .btn { display:inline-flex;align-items:center;gap:8px;padding:16px 30px;border-radius:999px;font-weight:700;font-size:14px;letter-spacing:.06em;text-transform:uppercase;text-decoration:none;background:linear-gradient(135deg,var(--strawberry-bright) 0%,var(--strawberry) 60%,var(--strawberry-deep) 100%);color:#fff;box-shadow:0 8px 22px -6px rgba(230,57,70,.55),inset 0 1px 0 rgba(255,255,255,.25);transition:transform .2s ease; }
    .btn:hover { transform: translateY(-2px); }
