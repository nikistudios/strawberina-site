  <style>
    :root { --bg:#0c0406;--gold:#d4af37;--gold-bright:#f2c94c;--gold-dim:#a88728;--ink:#f5e9d5;--ink-dim:#c9b89a; }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { font-family:'Inter',system-ui,sans-serif;color:var(--ink);background:var(--bg);background-image:radial-gradient(ellipse at top,rgba(139,30,44,.35),transparent 55%),radial-gradient(ellipse at bottom,rgba(90,20,32,.25),transparent 60%),linear-gradient(180deg,#0c0406 0%,#15080c 50%,#0c0406 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px; }
    .card { max-width: 600px; text-align: center; }
    .brand { font-family:'Great Vibes',cursive;font-size:40px;background:linear-gradient(135deg,var(--gold-bright),var(--gold),var(--gold-dim));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;display:inline-block;margin-bottom:32px;line-height:1.4;padding:6px 10px;text-decoration:none; }
    .eyebrow { font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.3em;color:var(--gold);margin:0 0 18px; }
    .portrait { width:220px;height:220px;margin:0 auto 24px;border-radius:50%;overflow:hidden;border:3px solid var(--gold);box-shadow:0 14px 36px rgba(0,0,0,.65),0 0 50px rgba(212,175,55,.35); }
    .portrait img { width:100%;height:100%;object-fit:cover;display:block; }
    h1 { font-family:'Playfair Display',serif;font-size:clamp(34px,5vw,50px);font-weight:700;background:linear-gradient(135deg,var(--gold-bright),var(--gold-dim));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin:0 0 16px;line-height:1.1; }
    .desc { font-family:'Playfair Display',serif;font-style:italic;font-size:17px;color:var(--ink-dim);max-width:480px;margin:0 auto 32px;line-height:1.55; }
    .btn { display:inline-flex;align-items:center;gap:8px;padding:16px 30px;border-radius:999px;font-weight:600;font-size:14px;letter-spacing:.08em;text-transform:uppercase;text-decoration:none;background:linear-gradient(135deg,var(--gold-bright) 0%,var(--gold) 50%,var(--gold-dim) 100%);color:#1a0a0e;box-shadow:0 8px 24px -8px rgba(212,175,55,.6),inset 0 1px 0 rgba(255,255,255,.35);transition:transform .2s ease; }
    .btn:hover { transform: translateY(-2px); }
